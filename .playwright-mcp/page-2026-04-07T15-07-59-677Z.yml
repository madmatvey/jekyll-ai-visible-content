                  - text: existing codebases
              - heading "My Approach to Work" [level=2] [ref=e133]
              - paragraph [ref=e134]: "I’m a proponent of “be your own manager”: documenting important decisions in text, working asynchronously, explaining trade-offs, and taking responsibility for imperfect but conscious decisions. I prefer documentation in tests and auto-generated artifacts, with key architectural decisions in brief text notes."
