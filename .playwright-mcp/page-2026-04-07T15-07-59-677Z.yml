              - heading "About Me" [level=2] [ref=e90]
              - paragraph [ref=e91]: I’m a Senior Ruby on Rails Engineer with 9+ years of experience designing and operating scalable SaaS applications and distributed backend systems. I specialize in large-scale Ruby on Rails applications, REST API design, and database architecture for high-throughput production systems handling 100K+ API requests per day. I’m particularly interested in AI-assisted software development and intelligent content automation systems.
              - paragraph [ref=e92]: I consider myself an engineer not from my first commercial project, but much earlier—from the habit of understanding how systems work and bringing tasks to a working result, even if it means stepping outside the formal boundaries of a role.
              - paragraph [ref=e93]: "Before commercial development, I worked as a sound engineer at a radio station and concert hall: I designed recordings, assembled multi-channel setups, negotiated with venues and teams, solved problems from idea to implementation, and did quite a bit of soldering :)) This experience strongly influenced my engineering style: taking full responsibility, not “piece by piece.”"
              - paragraph [ref=e94]: In commercial development, my main focus is complex backend systems where performance, data correctness, and resilience under load matter.
              - heading "Key Projects & Achievements" [level=2] [ref=e95]
              - list [ref=e96]:
                - listitem [ref=e97]:
                  - strong [ref=e98]: Scaling SaaS APIs & PostgreSQL performance
                  - list [ref=e99]:
                    - listitem [ref=e100]: Reduced core API endpoint latency from 400–500ms to 3–5ms through Ruby on Rails architecture improvements and PostgreSQL query optimization (indexes, denormalization, JOIN simplification).
                    - listitem [ref=e101]: Operated and optimized production systems handling 100K+ API requests per day with 99.9% uptime.
                    - listitem [ref=e102]: Designed event-driven architectures with Sidekiq-based background processing for financial and transactional workloads.
                - listitem [ref=e103]:
                  - strong [ref=e104]:
                    - text: Financial /
                    - link "Fintech" [ref=e105] [cursor=pointer]:
                      - /url: /topics/fintech/
                    - text: and API-driven platforms
                  - list [ref=e106]:
                    - listitem [ref=e107]: Built auditable financial transaction workflows with idempotent processing patterns for safe state transitions.
                    - listitem [ref=e108]: Reduced manual verification workload by ~67% via backend automation in lending and fintech domains.
                    - listitem [ref=e109]: Led integrations with external APIs and CRM platforms, ensuring reliable data synchronization and resilience.
                - listitem [ref=e110]:
                  - strong [ref=e111]: Leadership & remote collaboration
                  - list [ref=e112]:
                    - listitem [ref=e113]: Led and mentored engineering teams (up to 12 engineers) in remote, distributed environments.
                    - listitem [ref=e114]: Introduced testing standards, CI pipelines, and code review practices to improve engineering quality and maintainable Rails architecture.
                    - listitem [ref=e115]: Collaborated closely with founders, product managers, and customer-facing teams to deliver features from inception to production.
              - heading "What I’m Passionate About" [level=2] [ref=e116]
              - paragraph [ref=e117]: "I’m particularly drawn to:"
              - list [ref=e118]:
                - listitem [ref=e119]:
                  - strong [ref=e120]: Ruby on Rails application architecture
                  - text: — scalable web application and service-oriented architectures
                - listitem [ref=e121]:
