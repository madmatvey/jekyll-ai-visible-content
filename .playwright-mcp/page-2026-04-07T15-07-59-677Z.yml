                  - text: — designing REST APIs and integrating external services and CRMs
                - listitem [ref=e123]:
                  - strong [ref=e124]: PostgreSQL performance optimization
                  - text: — query tuning, indexing strategies, and data modeling for high-throughput systems
                - listitem [ref=e125]:
                  - strong [ref=e126]: Asynchronous processing pipelines
                  - text: — Sidekiq, background jobs, and distributed processing
                - listitem [ref=e127]:
