              - paragraph [ref=e290]:
                - text: If you run Sidekiq and your cache on the same Redis instance, you must choose one eviction policy for both. Choose
                - code [ref=e291]: volatile-lru
                - text: and Redis may quietly delete Sidekiq jobs when memory is under pressure — only volatile keys (those with TTLs) are eligible, but Sidekiq keys typically have no TTL, so they would survive until Redis actually fills up and errors. Choose
                - code [ref=e292]: noeviction
                - text: and Redis will start returning errors on cache writes instead of evicting stale entries.
              - paragraph [ref=e293]: There is no eviction policy that is correct for both roles simultaneously.
