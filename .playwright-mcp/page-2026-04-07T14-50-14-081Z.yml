                  - text: freeing memory from recent
                  - code [ref=e167]: UNLINK
                  - text: calls
              - paragraph [ref=e168]: This is not a single-threaded application. It is a coordinated multi-layered system with a single point of command serialisation.
              - separator [ref=e169]
              - heading "Atomicity and Transactions" [level=2] [ref=e170]
              - paragraph [ref=e171]:
                - text: Every Redis command is atomic.
                - code [ref=e172]: INCR
                - text: ","
                - code [ref=e173]: SETNX
                - text: ","
                - code [ref=e174]: LPUSH
                - text: — none of these can be interrupted mid-execution by another client. Because all commands execute on the main thread serially, there is no partial state.
              - paragraph [ref=e175]:
                - code [ref=e176]: MULTI/EXEC
                - text: "provides a form of batched execution: commands queued inside a"
                - code [ref=e177]: MULTI
                - text: block are executed as a unit without interleaving from other clients. However, this is not a transaction in the database sense. There is no rollback. If a command within the block fails at runtime, the others still execute.
              - paragraph [ref=e178]:
                - text: For true atomic multi-step logic, Lua scripts are the right tool. A script executed with
                - code [ref=e179]: EVAL
                - text: "runs entirely on the main thread without interruption. This makes it suitable for patterns like atomic increment-with-TTL for rate limiting:"
