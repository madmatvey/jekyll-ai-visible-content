              - paragraph [ref=e96]:
                - text: "Every Rails developer has heard it:"
                - emphasis [ref=e97]: “Redis is single-threaded.”
              - paragraph [ref=e98]: Few people know exactly what that means. And fewer still know that it’s only half the story.
              - paragraph [ref=e99]: Redis serialises command execution on a single main thread. That part is true. But I/O, persistence, and memory management have been running on separate threads and processes for years. Since Redis 6.0, even network reads and writes are handled by a dedicated pool of I/O threads. At 8 I/O threads, throughput improves by 37–112% on multi-core hardware.
              - paragraph [ref=e100]: This distinction matters in practice. When you misunderstand Redis’s execution model, you misconfigure it. Misconfigurations in production mean either lost Sidekiq jobs, blocked event loops, or quietly filling memory with no TTLs. This article walks through how Redis actually works, and how to use that knowledge to configure Redis correctly in every part of a Rails application.
              - separator [ref=e101]
              - heading "The Common Misconception" [level=2] [ref=e102]
              - paragraph [ref=e103]: "The phrase “Redis is single-threaded” leads engineers to two wrong conclusions:"
              - paragraph [ref=e104]: First, that Redis is therefore slow or poorly suited for concurrent workloads. Second, that because it’s simple under the hood, a single instance with default configuration is fine for everything.
              - paragraph [ref=e105]: Both are wrong.
              - paragraph [ref=e106]: Redis’s command serialisation is a deliberate architectural decision. It eliminates lock contention entirely. There are no mutexes around data structures, no deadlocks, no context switches between competing threads trying to access the same key. A single serialisation point is not a bottleneck when that point can process hundreds of thousands of commands per second.
              - paragraph [ref=e107]: "The speed of Redis comes from three things: data lives in RAM, there is no lock overhead, and the event loop is extremely efficient at managing thousands of concurrent connections with almost no CPU waste. “Single-threaded” is not the reason Redis is fast. It’s a side effect of the architecture that makes Redis fast."
              - separator [ref=e108]
              - heading "What Is Actually Happening Inside Redis" [level=2] [ref=e109]
              - paragraph [ref=e110]: A running Redis process is composed of several distinct execution layers.
              - heading "The Event Loop and I/O Multiplexing" [level=3] [ref=e111]
              - paragraph [ref=e112]:
                - text: "The main thread runs a tight event loop built on the Reactor pattern. Instead of assigning a thread to each client connection, Redis uses the operating system’s notification mechanisms to watch all connections simultaneously:"
                - code [ref=e113]: epoll
                - text: on Linux,
                - code [ref=e114]: kqueue
                - text: on BSD and macOS, and
                - code [ref=e115]: select
                - text: as a fallback.
              - paragraph [ref=e116]: The loop does not block waiting for a client to send data. The OS notifies Redis the moment a socket has data ready to read. This allows one thread to efficiently serve tens of thousands of simultaneous connections. The cost of managing a connection that is idle is nearly zero.
              - paragraph [ref=e117]: "This is what makes the single-threaded model viable. The thread is never sitting idle waiting for network I/O. It is only ever doing actual work: parsing commands and executing them."
              - heading "I/O Threading Since Redis 6.0" [level=3] [ref=e118]
              - paragraph [ref=e119]: "Before version 6.0, the main thread was responsible for the entire request lifecycle: reading the socket, parsing the command, executing it, and writing the response back. This worked well, but on multi-core hardware it left significant CPU capacity unused."
              - paragraph [ref=e120]: Redis 6.0 introduced a dedicated pool of I/O threads. These threads now handle socket reads and writes, freeing the main thread to focus exclusively on command execution. The main thread still executes all commands serially. But the heavy lifting of network I/O is now parallelised.
              - paragraph [ref=e121]: "To enable this:"
              - generic [ref=e122]:
                - generic [ref=e123]:
                  - generic [ref=e124]:
                    - generic [ref=e125]: 
                    - text: Plaintext
                  - button "copy" [ref=e126] [cursor=pointer]:
                    - generic [ref=e127]: 
                - code [ref=e129]:
                  - table [ref=e130]:
                    - rowgroup [ref=e131]:
                      - row "# redis.conf io-threads 4 io-threads-do-writes yes" [ref=e132]:
                        - cell
                        - cell "# redis.conf io-threads 4 io-threads-do-writes yes" [ref=e133]:
                          - generic [ref=e134]: "# redis.conf io-threads 4 io-threads-do-writes yes"
              - paragraph [ref=e135]: A reasonable starting point is one I/O thread per two CPU cores, leaving headroom for the main thread and OS work. Benchmarks from the Redis authors show a 37–112% throughput improvement with 8 I/O threads under high-connection, high-throughput workloads.
              - heading "Persistence Mechanisms" [level=3] [ref=e136]
              - paragraph [ref=e137]: Redis’s persistence does not happen on the main thread.
              - paragraph [ref=e138]:
                - strong [ref=e139]: "RDB (point-in-time snapshots):"
                - text: Redis calls
                - code [ref=e140]: fork()
                - text: . The child process writes the entire dataset to disk while the main process continues serving requests. The Linux kernel’s copy-on-write semantics mean the child gets a consistent view of memory without duplicating it upfront. Pages are only copied when the main process writes to them.
              - paragraph [ref=e141]:
                - strong [ref=e142]: "AOF (Append-Only File):"
                - text: Every executed command is appended to an in-memory buffer. A background thread handles flushing this buffer to disk with
                - code [ref=e143]: fsync
                - text: . The
                - code [ref=e144]: appendfsync
                - text: "configuration controls the trade-off:"
                - code [ref=e145]: always
                - text: gives the strongest durability guarantee,
                - code [ref=e146]: everysec
                - text: gives a one-second data loss window with much better performance,
                - code [ref=e147]: "no"
                - text: delegates flushing to the OS.
              - heading "Lazy Memory Freeing" [level=3] [ref=e148]
              - paragraph [ref=e149]: Deleting a large key — a sorted set with a million members, or a hash with complex nested values — is an O(N) operation. Before Redis 4.0, this happened synchronously on the main thread, causing latency spikes.
              - paragraph [ref=e150]:
                - text: Since Redis 4.0,
                - code [ref=e151]: UNLINK
                - text: offloads memory deallocation to a background thread. The key is immediately removed from the keyspace (so subsequent lookups return nil), but the memory is freed asynchronously. For large keys in production, prefer
                - code [ref=e152]: UNLINK
                - text: over
                - code [ref=e153]: DEL
                - text: .
              - heading "The Full Picture" [level=3] [ref=e154]
              - paragraph [ref=e155]: "A production Redis process at any moment may have:"
              - list [ref=e156]:
                - listitem [ref=e157]:
                  - text: The
                  - strong [ref=e158]: main thread
                  - text: executing commands serially
                - listitem [ref=e159]:
                  - strong [ref=e160]: N I/O threads
                  - text: reading and writing sockets in parallel
                - listitem [ref=e161]:
                  - text: A
                  - strong [ref=e162]: forked child process
                  - text: writing an RDB snapshot
                - listitem [ref=e163]:
                  - text: A
                  - strong [ref=e164]: background thread
                  - text: flushing the AOF buffer or compacting it during rewrite
                - listitem [ref=e165]:
                  - text: A
