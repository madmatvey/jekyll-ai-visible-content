              - heading "Connection Pooling in a Puma Application" [level=2] [ref=e343]
              - paragraph [ref=e344]: Puma runs multiple threads per worker. By default, 5 threads per worker process. Without a connection pool, each thread opens its own TCP connection to Redis. With three Redis-backed components (cache, Sidekiq client, Action Cable), that is 15+ connections per worker, most of which sit idle most of the time.
              - paragraph [ref=e345]:
                - text: The
                - code [ref=e346]: connection_pool
                - text: gem solves this by maintaining a fixed pool of connections shared across threads. A thread checks out a connection, uses it, and returns it to the pool.
