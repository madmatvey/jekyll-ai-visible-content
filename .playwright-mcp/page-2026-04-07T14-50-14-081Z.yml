              - heading "Failure Modes and Anti-Patterns" [level=2] [ref=e472]
              - paragraph [ref=e473]: These are the most common ways Redis becomes a production incident.
              - paragraph [ref=e474]:
                - strong [ref=e475]:
                  - code [ref=e476]: KEYS *
                  - text: in production.
                - text: This is an O(N) operation that blocks the event loop for every client while it scans the entire keyspace. On an instance with 10 million keys, this can take seconds. Use
                - code [ref=e477]: SCAN
                - text: "with a cursor instead — it iterates incrementally without blocking:"
