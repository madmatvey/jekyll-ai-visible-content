              - paragraph [ref=e493]:
                - strong [ref=e494]: Storing large serialised objects.
                - text: Values over 1MB indicate a design problem. Redis is optimised for small, frequently accessed values. Storing an entire serialised ActiveRecord object with all associations defeats the purpose of caching — you are just moving database load to Redis without the durability guarantees.
              - paragraph [ref=e495]:
                - strong [ref=e496]: Missing TTLs on cache keys.
                - text: Memory fills up without warning. Every key written to a cache instance should have an expiration. Use
                - code [ref=e497]: redis-cli --bigkeys
                - text: and
                - code [ref=e498]: redis-cli info memory
                - text: periodically to audit key sizes and memory pressure.
              - paragraph [ref=e499]:
                - strong [ref=e500]:
                  - code [ref=e501]: BLPOP
                  - text: without a timeout.
                - text: "A blocking pop with no timeout holds a connection indefinitely if the queue is empty. This consumes a slot in the connection pool. Always specify a timeout:"
              - generic [ref=e502]:
