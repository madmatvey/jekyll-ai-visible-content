              - separator [ref=e200]
              - heading "Pub/Sub, Lists, and Streams" [level=2] [ref=e201]
              - paragraph [ref=e202]: Redis is not only a key-value store. It provides three distinct mechanisms for inter-process communication, each with different guarantees.
              - paragraph [ref=e203]:
                - strong [ref=e204]: Pub/Sub
                - text: "is fire-and-forget. Messages are delivered to all subscribers currently listening on a channel. If no one is subscribed, the message is dropped. There is no persistence, no replay, no acknowledgement. This is what Action Cable uses to broadcast WebSocket messages between Puma workers: it works because the subscriber (the Action Cable server) is always running."
              - paragraph [ref=e205]:
                - strong [ref=e206]: Lists with LPUSH/BRPOP
                - text: are how Sidekiq implements its job queue.
                - code [ref=e207]: BRPOP
                - text: blocks until an item is available, then pops it atomically. If the worker process crashes after popping but before finishing the job, the job is lost unless Sidekiq’s visibility timeout and retry logic account for it. This is why Sidekiq requires
                - code [ref=e208]: noeviction
                - text: — if Redis evicts a job under memory pressure, it disappears silently.
              - paragraph [ref=e209]:
                - strong [ref=e210]: Redis Streams
                - text: are a persistent, ordered log with consumer groups. A message written to a stream stays there until explicitly deleted. Consumer groups allow multiple workers to divide a stream between them, with explicit acknowledgement (
                - code [ref=e211]: XACK
                - text: ) required before a message is considered processed. For event sourcing, audit logs, or any pattern requiring durable delivery and replay, Streams are the right choice — not Pub/Sub.
