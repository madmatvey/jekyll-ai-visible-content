              - paragraph [ref=e517]:
                - strong [ref=e518]: Shared Redis for Sidekiq and cache.
                - text: Covered above — the eviction policy mismatch will eventually cause data loss. The cost of a second Redis instance (even a small one) is far lower than debugging missing jobs.
              - paragraph [ref=e519]:
                - strong [ref=e520]: No reconnect logic.
                - text: Network blips happen. Configure reconnect attempts on your Redis client and ensure your application handles
                - code [ref=e521]: Redis::CannotConnectError
                - text: gracefully rather than returning 500s.
              - separator [ref=e522]
              - heading "When Not to Use Redis" [level=2] [ref=e523]
              - paragraph [ref=e524]: Redis is the right tool for a specific set of problems. It is not the universal answer.
              - paragraph [ref=e525]: "Do not use Redis when:"
              - list [ref=e526]:
                - listitem [ref=e527]:
                  - strong [ref=e528]: Your dataset exceeds available RAM.
                  - text: Redis is an in-memory store. Exceeding
                  - code [ref=e529]: maxmemory
                  - text: either blocks writes or starts evicting data. If your working set does not fit in RAM, use a disk-backed store.
                - listitem [ref=e530]:
                  - strong [ref=e531]: You need complex queries.
                  - text: Redis does not support joins, aggregations, or full-text search. These belong in PostgreSQL or Elasticsearch.
                - listitem [ref=e532]:
                  - strong [ref=e533]: You need ACID guarantees.
                  - code [ref=e534]: MULTI/EXEC
                  - text: provides atomicity and isolation, but not durability in the relational sense. Financial transactions, inventory management, anything where partial writes have business consequences — use PostgreSQL.
                - listitem [ref=e535]:
                  - strong [ref=e536]: You are on Rails 8 with modest requirements.
                  - text: Solid Cache and Solid Queue are SQLite-backed alternatives that remove the operational dependency on Redis entirely. For applications that do not require sub-millisecond cache latency or very high job throughput, they are a legitimate choice.
              - separator [ref=e537]
              - heading "Production Checklist" [level=2] [ref=e538]
              - paragraph [ref=e539]: Before deploying a Rails application that uses Redis, verify each of these.
              - paragraph [ref=e540]:
                - strong [ref=e541]: "Instance configuration:"
              - list [ref=e542]:
                - listitem [ref=e543]:
                  - text: Separate Redis instances for Sidekiq (
                  - code [ref=e544]: noeviction
                  - text: ", AOF enabled) and cache ("
                  - code [ref=e545]: volatile-lru
                  - text: ", no AOF)"
                - listitem [ref=e546]:
                  - code [ref=e547]: maxmemory
                  - text: explicitly set on all instances — never rely on OS default
                - listitem [ref=e548]:
                  - code [ref=e549]: maxmemory-policy
                  - text: explicitly set and matched to the role of the instance
                - listitem [ref=e550]:
                  - code [ref=e551]: io-threads
                  - text: configured for the number of available CPU cores (Redis 6+)
                - listitem [ref=e552]:
                  - code [ref=e553]: bind
                  - text: set to an internal network interface — never expose Redis to the public internet
              - paragraph [ref=e554]:
                - strong [ref=e555]: "Application code:"
              - list [ref=e556]:
                - listitem [ref=e557]:
                  - code [ref=e558]: ConnectionPool
                  - text: used for all direct Redis access outside of Rails.cache and Sidekiq
                - listitem [ref=e559]:
                  - text: All cache keys written with
                  - code [ref=e560]: expires_in
                - listitem [ref=e561]:
                  - code [ref=e562]: SCAN
                  - text: used instead of
                  - code [ref=e563]: KEYS
                  - text: anywhere key iteration is needed
                - listitem [ref=e564]:
                  - code [ref=e565]: UNLINK
                  - text: used instead of
                  - code [ref=e566]: DEL
                  - text: for large keys
                - listitem [ref=e567]: Lua scripts used for any read-modify-write pattern requiring atomicity
                - listitem [ref=e568]:
                  - code [ref=e569]: BLPOP
                  - text: calls have a timeout argument
              - paragraph [ref=e570]:
                - strong [ref=e571]: "Observability:"
              - list [ref=e572]:
                - listitem [ref=e573]:
                  - text: Memory usage alerts configured at 75% of
                  - code [ref=e574]: maxmemory
                - listitem [ref=e575]:
                  - text: "Latency monitoring:"
                  - code [ref=e576]: redis-cli --latency-history -i 5
                - listitem [ref=e577]:
                  - text: "Connection count tracking:"
                  - code [ref=e578]: redis-cli info clients
                - listitem [ref=e579]:
                  - text: "Slow log reviewed regularly:"
                  - code [ref=e580]: redis-cli slowlog get 25
                - listitem [ref=e581]:
                  - text: "Keyspace statistics monitored:"
                  - code [ref=e582]: redis-cli info keyspace
              - separator [ref=e583]
              - heading "Conclusion" [level=2] [ref=e584]
              - paragraph [ref=e585]: "Redis’s “single-threaded” reputation is a shorthand that obscures more than it explains. Command execution is serialised on one thread — and that is a deliberate, correct design decision that eliminates an entire class of concurrency bugs. Everything else: network I/O, persistence, memory management — is concurrent."
              - paragraph [ref=e586]:
                - text: Understanding this changes how you configure Redis. It explains why I/O threads matter on multi-core hardware. It explains why
                - code [ref=e587]: UNLINK
                - text: exists and when to use it. It explains why a Lua script gives you atomicity guarantees that
                - code [ref=e588]: MULTI/EXEC
                - text: alone does not.
              - paragraph [ref=e589]: "In a Rails application, Redis touches nearly every layer: cache, background jobs, WebSocket broadcasting, session storage, rate limiting. Each of those roles has different durability and eviction requirements. The correct architecture is not one Redis instance that tries to satisfy all of them — it is separate, purpose-configured instances that each do their job well."
              - paragraph [ref=e590]:
                - text: The operational cost of running two or three small Redis instances is low. The cost of debugging a production incident caused by eviction policy mismatch or a blocking
