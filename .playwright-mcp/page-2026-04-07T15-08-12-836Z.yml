              - heading "How I Hired a Fast AI Junior Developer for $192 a Year" [level=3] [ref=e96]:
                - strong [ref=e98]: How I Hired a Fast AI Junior Developer for $192 a Year
              - paragraph [ref=e99]: I’ve been coding for 25 years, constantly looking for ways to speed up development. Recently, I found a tool that completely changed how I write code.
              - paragraph [ref=e100]: For just $192 a year, I essentially “hired” an AI junior developer—Cursor.ai with Claude 3.5. Now, instead of writing code myself, I focus on setting tasks, reviewing, and making corrections.
              - heading "How My Workflow Changed" [level=4] [ref=e101]:
                - strong [ref=e103]: How My Workflow Changed
              - paragraph [ref=e104]:
                - text: I used to break down large tasks, prioritize them, and manually write the code. Now, I assign these tasks to
                - link "Cursor.com" [ref=e105] [cursor=pointer]:
                  - /url: https://cursor.com
                - text: . It writes the code, covers it with tests, fixes bugs, and I only step in to guide and review the results. In the end, about 80% of the code is good to go, and I fine-tune the remaining 20%.
              - heading "What AI Does Best" [level=4] [ref=e106]:
                - strong [ref=e108]: What AI Does Best
              - paragraph [ref=e109]: "It excels at tasks with a clearly defined expected outcome. But there are some quirks:"
              - list [ref=e110]:
                - listitem [ref=e111]: It struggles when it’s unclear which library versions to use, especially if APIs have changed.
                - listitem [ref=e112]: Sometimes, it modifies parts of the code I didn’t ask it to touch, showing unexpected “initiative”—which can be either useful or frustrating.
              - paragraph [ref=e113]: But at times, it really impresses me! For example, I once asked it to analyze my code for potential race conditions, and it not only highlighted unexpected issues but also suggested fixes based on existing patterns in my project.
              - heading "How My Role Has Changed" [level=4] [ref=e114]:
                - strong [ref=e116]: How My Role Has Changed
              - paragraph [ref=e117]:
                - text: I feel like I’ve hired a super-fast junior dev who works 24/7 and gets things right about 80% of the time.
                - text: My productivity has increased 2-3 times. I get more done and, more importantly, I have more time to think things through and even take breaks.
              - heading "Is $192 a Year Worth It?" [level=4] [ref=e118]:
                - strong [ref=e120]: Is $192 a Year Worth It?
              - paragraph [ref=e121]: For me—absolutely. It’s a fully justified investment. I used to have a Copilot subscription but canceled it because it was more of a distraction than a help.
              - paragraph [ref=e122]: Who would I recommend it to? Pretty much anyone! I even saw a 5-year-old girl build an AI-powered chat with Harry Potter just by giving Cursor.ai commands—without knowing anything about web development. This is mind-blowing and has potential across many fields.
              - paragraph [ref=e123]: The key is learning how to set tasks properly. Once you do, AI won’t get in your way—it’ll actually help you.
